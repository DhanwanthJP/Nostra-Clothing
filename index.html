<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nostra</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- Offer -->
    <div id="offer-container">
        <p id="offer">
            Sign Up and <span style="font-weight: bolder">GET 20% OFF</span> for
            your first Order
        </p>
        <div id="offer-close">
            <i class="fa-solid fa-xmark fa-xs" style="color: rgb(248, 245, 240)"></i>
        </div>
    </div>

    <!-- Navbar Section -->
    <nav id="navbarContainer">
        <div id="navbar">
            <div id="navbar-menu">
                <i id="navbar-menu-icon" class="fa-solid fa-bars fa-lg"></i>
            </div>
            <a href="./index.html">
                <h1 id="navbar-s1">NOSTRA</h1>
            </a>
            <ul id="navbar-s2">
                <li><a href="index.html">HOME</a></li>
                <li><a href="#new-arrival">NEW ARRIVAL</a></li>
                <li><a href="#most-wanted">MOST WANTED</a></li>
                <li><a href="collections.html">COLLECTIONS</a></li>
                <li><a href="contact.html">CONTACT US</a></li>
            </ul>
            <div id="navbar-s3">
                <i class="fa-solid fa-magnifying-glass fa-lg" style="color: rgb(14, 14, 14)"></i>
                <i class="fa-solid fa-heart fa-lg" style="color: rgb(14, 14, 14)"></i>
                <i class="fa-solid fa-bag-shopping fa-lg" style="color: rgb(14, 14, 14)"></i>
            </div>
        </div>
    </nav>

    <!-- Side Nav -->
    <nav id="sideNav" style="width: 40%;height: 100vh;margin-left: -50%;">
        <div id="sideNav-s1">
        <a href="./index.html"><h3>NOSTRA</h3></a>
        <i id="sideNav-close" class="fa-solid fa-xmark" style="color: rgb(0, 0, 0)"></i>
        </div>
        <ul id="sideNav-list">
            <li><a href="index.html">HOME</a></li>
            <li><a href="#new-arrival">NEW ARRIVAL</a></li>
            <li><a href="#most-wanted">MOST WANTED</a></li>
            <li><a href="collections.html">COLLECTIONS</a></li>
            <li><a href="contact.html">CONTACT US</a></li>
        </ul>
    </nav>

    <div id="mainContainer">
        <!--Slider-->
        <div class="slider">
            <div class="slider-left">
                <i id="slider-left-icon" class="fa-solid fa-angle-left" style="color: #ffffff;"></i>
            </div>

            <div class="slider-content">
                <h1>Step into style with our <br>newest arrivals</h1>
                <h2>Summer Collections</h2>
                <button> Shop Now</button>
            </div>

            <div class="slider-image-container">
                <img class="slider-image" src="./images/slider-image1.png" width="100%" alt="">
                <img class="slider-image" src="./images/slider-image2.png" alt="">
                <img class="slider-image" src="./images/slider-image3.png" alt="">
            </div>

            <div class="slider-right">

                <i id="slider-right-icon" class="fa-solid fa-angle-right" style="color: #ffffff;"></i>
            </div>
        </div>


    </div>



    <script src="script.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nostra</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contactStyle.css">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <!-- Offer -->
    <div id="offer-container">
        <p id="offer">
            Sign Up and <span style="font-weight: bolder">GET 20% OFF</span> for
            your first Order
        </p>
        <div id="offer-close">
            <i class="fa-solid fa-xmark fa-xs" style="color: rgb(248, 245, 240)"></i>
        </div>
    </div>

    <!-- Navbar Section -->
    <nav id="navbarContainer">
        <div id="navbar">
            <div id="navbar-menu">
                <i id="navbar-menu-icon" class="fa-solid fa-bars fa-lg"></i>
            </div>
            <a href="./index.html">
                <h1 id="navbar-s1">NOSTRA</h1>
            </a>
            <ul id="navbar-s2">
                <li><a href="index.html">HOME</a></li>
                <li><a href="#new-arrival">NEW ARRIVAL</a></li>
                <li><a href="#most-wanted">MOST WANTED</a></li>
                <li><a href="collections.html">COLLECTIONS</a></li>
                <li>
                    <a href="contact.html"><span style="
                  color: var(--tertiary-color);
                  border-bottom: 1px solid var(--secondary-color);
                ">CONTACT US</span></a>
                </li>
            </ul>
            <div id="navbar-s3">
                <i class="fa-solid fa-magnifying-glass fa-lg" style="color: rgb(14, 14, 14)"></i>
                <i class="fa-solid fa-heart fa-lg" style="color: rgb(14, 14, 14)"></i>
                <i class="fa-solid fa-bag-shopping fa-lg" style="color: rgb(14, 14, 14)"></i>
            </div>
        </div>
    </nav>

    <!-- Side Nav -->
    <nav id="sideNav" style="width: 40%; height: 100vh; margin-left: -50%">
        <div id="sideNav-s1">
            <a href="./index.html">
                <h3>NOSTRA</h3>
            </a>
            <i id="sideNav-close" class="fa-solid fa-xmark" style="color: rgb(0, 0, 0)"></i>
        </div>
        <ul id="sideNav-list">
            <li><a href="index.html">HOME</a></li>
            <li><a href="#new-arrival">NEW ARRIVAL</a></li>
            <li><a href="#most-wanted">MOST WANTED</a></li>
            <li><a href="collections.html">COLLECTIONS</a></li>
            <li>
                <a href="contact.html"><span style="
                color: var(--tertiary-color);
                border-bottom: 1px solid var(--secondary-color);
              ">CONTACT US</span></a>
            </li>
        </ul>
    </nav>
    <!-- Contact form -->
    <div class="contact-container">
    <h2 class="contact-title">Contact us</h2>

    <form class="contact-form" id="contactForm">

        <div class="form-group">
            <label>Name</label>
            <input id="name" type="text" placeholder="Enter Name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="Enter Email">
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input id="subject" type="text" placeholder="Enter Subject">
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea id="message" rows="6" placeholder="Type your Message"></textarea>
        </div>

        <p id="formError" style="color:red;"></p>
        <p id="formSuccess" style="color:green;"></p>

        <button class="submit-btn" type="submit">
            Send message
        </button>

    </form>
</div>

    <script src="script.js"></script>
    <script src="contact.js"></script>
</body>

</html>
